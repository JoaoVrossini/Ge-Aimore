<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel | G.E. Aimoré 01/MG</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        if (localStorage.getItem('aimore-theme') === 'light') {
            document.documentElement.classList.add('light-mode');
        }
    </script>

    <style>
        /* DESIGN SYSTEM GLOBAL */
        :root {
            --bg-fundo: #050a1f;
            --bg-card: #0e1633;
            --bg-header: #0e1633;
            --bg-hover: #1a244d;
            --azul-aimore: #1a2857;
            --amarelo-corda: #ffde00;
            --branco: #ffffff;
            --texto-principal: #ffffff;
            --texto-apoio: #a0aec0;
            --borda: rgba(255, 255, 255, 0.05);
            --sombra: 0 10px 30px rgba(0,0,0,0.5);
        }

        html.light-mode {
            --bg-fundo: #f4f6f8;
            --bg-card: #ffffff;
            --bg-header: #ffffff;
            --bg-hover: #f0f2f5;
            --texto-principal: #1a2857;
            --texto-apoio: #4a5568;
            --borda: rgba(26, 40, 87, 0.1);
            --sombra: 0 4px 15px rgba(26, 40, 87, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        
        body { 
            background-color: var(--bg-fundo); 
            color: var(--texto-principal); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            transition: background-color 0.3s ease;
        }

        /* HEADER */
        header { 
            background: var(--bg-header); 
            padding: 15px 30px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid var(--amarelo-corda); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            transition: background-color 0.3s ease;
        }
        .logo-area { display: flex; align-items: center; gap: 10px; }
        .logo-area h1 { font-size: 1.2rem; color: var(--texto-principal); font-weight: 700; margin: 0; }
        
        .header-actions { display: flex; gap: 15px; align-items: center; }
        .btn-theme { background: transparent; border: 1px solid var(--texto-apoio); color: var(--texto-apoio); border-radius: 50%; width: 35px; height: 35px; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .btn-logout { background: transparent; border: 1px solid var(--texto-apoio); color: var(--texto-apoio); padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 600; }
        .btn-logout:hover { border-color: var(--erro, #e74c3c); color: var(--erro, #e74c3c); }

        /* CONTEÚDO */
        .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; width: 100%; flex-grow: 1; }
        
        .boas-vindas { margin-bottom: 40px; }
        .boas-vindas h2 { font-size: 2rem; font-weight: 700; margin-bottom: 5px; color: var(--texto-principal); }
        .boas-vindas p { color: var(--texto-apoio); font-size: 1rem; }
        .highlight { color: var(--amarelo-corda); }

        .section-title { font-size: 1.1rem; font-weight: 600; color: var(--texto-principal); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .section-title::after { content: ""; flex-grow: 1; height: 1px; background: var(--borda); }

        /* GRID INTELIGENTE */
        .grid-apps { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 20px; 
            margin-bottom: 40px;
        }

        /* CARDS */
        .app-card { 
            background: var(--bg-card); 
            padding: 35px 20px; 
            border-radius: 16px; 
            text-decoration: none; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-align: center;
            border: 1px solid var(--borda);
            box-shadow: var(--sombra);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .app-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 5px; background: var(--amarelo-corda); opacity: 0; transition: 0.3s; }
        
        .app-card:hover { transform: translateY(-5px); background: var(--bg-hover); border-color: var(--amarelo-corda); }
        .app-card:hover::before { opacity: 1; }
        
        .app-icon { font-size: 2.8rem; margin-bottom: 15px; display: block; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }
        .app-card h3 { font-size: 1.1rem; font-weight: 700; margin: 0; color: var(--texto-principal); }
        .app-card p { font-size: 0.8rem; color: var(--texto-apoio); margin-top: 5px; }

        .app-card.disabled { opacity: 0.5; pointer-events: none; border-style: dashed; }
        .badge-breve { position: absolute; top: 15px; right: -30px; background: var(--amarelo-corda); color: #1a2857; font-size: 0.65rem; font-weight: 800; padding: 4px 35px; transform: rotate(45deg); text-transform: uppercase; }

    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <span style="font-size: 1.5rem;">⚜️</span>
            <h1>Aimoré OS</h1>
        </div>
        <div class="header-actions">
            <button class="btn-theme" id="theme-btn" onclick="toggleTheme()">☀️</button>
            <button class="btn-logout" onclick="fazerLogout()">Sair</button>
        </div>
    </header>

    <main class="container">
        
        <div class="boas-vindas">
            <h2>Sempre Alerta, <span class="highlight" id="user-display">Escoteiro</span>!</h2>
            <p>Selecione abaixo o módulo que deseja acessar hoje.</p>
        </div>

        <h3 class="section-title">Sistemas Operacionais</h3>
        <div class="grid-apps">
            <a href="inventario.html" class="app-card">
                <span class="app-icon">📦</span>
                <h3>Almoxarifado</h3>
                <p>Materiais e Reservas</p>
            </a>

            <a href="autorizacoes.html" class="app-card">
                <span class="app-icon">📝</span>
                <h3>Autorizações</h3>
                <p>Gestão de Atividades</p>
            </a>
        </div>

        <h3 class="section-title">Futuros Módulos</h3>
        <div class="grid-apps">
            <a href="#" class="app-card disabled">
                <div class="badge-breve">Em breve</div>
                <span class="app-icon">🏥</span>
                <h3>Fichas Médicas</h3>
                <p>Controle de saúde</p>
            </a>
            
            <a href="#" class="app-card disabled">
                <div class="badge-breve">Em breve</div>
                <span class="app-icon">📊</span>
                <h3>Financeiro</h3>
                <p>Caixa da Tropa</p>
            </a>
        </div>

    </main>

    <script>
        // Ajusta o ícone inicial do tema
        if (document.documentElement.classList.contains('light-mode')) {
            document.getElementById('theme-btn').innerText = '🌙';
        } else {
            document.getElementById('theme-btn').innerText = '☀️';
        }

        function toggleTheme() {
            const html = document.documentElement;
            const btn = document.getElementById('theme-btn');
            
            if (html.classList.contains('light-mode')) {
                html.classList.remove('light-mode');
                btn.innerText = '☀️';
                localStorage.setItem('aimore-theme', 'dark');
            } else {
                html.classList.add('light-mode');
                btn.innerText = '🌙';
                localStorage.setItem('aimore-theme', 'light');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const registro = localStorage.getItem('userName');
            if (!registro) {
                window.location.href = 'index.html';
                return;
            }
            document.getElementById('user-display').innerText = `Reg. ${registro}`;
        });

        function fazerLogout() {
            localStorage.removeItem('userRole');
            localStorage.removeItem('userName');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
