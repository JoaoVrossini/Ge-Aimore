<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservar Item | G.E. Aimoré</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/pt.js"></script>

    <script>
        if (localStorage.getItem('aimore-theme') === 'light') {
            document.documentElement.classList.add('light-mode');
        }
    </script>

    <style>
        /* DESIGN SYSTEM GLOBAL */
        :root {
            --bg-fundo: #050a1f;
            --bg-card: #0e1633;
            --bg-header: #0e1633;
            --bg-input: #1a244d;
            --azul-aimore: #1a2857;
            --amarelo-corda: #ffde00;
            --branco: #ffffff;
            --texto-principal: #ffffff;
            --texto-apoio: #a0aec0;
            --sucesso: #118742;
            --erro: #e74c3c;
            --aviso: #f39c12;
            --borda: rgba(255, 255, 255, 0.05);
            --sombra: 0 10px 30px rgba(0,0,0,0.5);
            
            /* Variáveis pro Calendário no Modo Escuro */
            --cal-bg: #0e1633;
            --cal-text: #ffffff;
            --cal-hover: #1a244d;
        }

        html.light-mode {
            --bg-fundo: #f4f6f8;
            --bg-card: #ffffff;
            --bg-header: #ffffff;
            --bg-input: #f0f2f5;
            --texto-principal: #1a2857;
            --texto-apoio: #4a5568;
            --borda: rgba(26, 40, 87, 0.1);
            --sombra: 0 4px 15px rgba(26, 40, 87, 0.1);
            
            /* Variáveis pro Calendário no Modo Claro */
            --cal-bg: #ffffff;
            --cal-text: #1a2857;
            --cal-hover: #f0f2f5;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        
        body { 
            background-color: var(--bg-fundo); 
            color: var(--texto-principal); 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            transition: background-color 0.3s ease;
        }

        /* HEADER */
        header { 
            background: var(--bg-header); 
            padding: 15px 20px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            border-bottom: 2px solid var(--amarelo-corda); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            transition: background-color 0.3s ease;
        }
        
        .header-left { display: flex; align-items: center; gap: 15px; }
        .btn-voltar { background: transparent; border: 1px solid var(--texto-apoio); color: var(--texto-apoio); width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer; text-decoration: none; transition: 0.3s; }
        .btn-voltar:hover { border-color: var(--amarelo-corda); color: var(--amarelo-corda); }
        .header-title { font-size: 1.1rem; font-weight: 600; color: var(--texto-principal); }
        
        .btn-theme { background: transparent; border: 1px solid var(--texto-apoio); color: var(--texto-apoio); border-radius: 50%; width: 35px; height: 35px; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.3s; }
        .btn-theme:hover { border-color: var(--amarelo-corda); color: var(--amarelo-corda); }

        /* HERO DO ITEM */
        .item-hero { text-align: center; padding: 30px 20px; }
        .item-hero h2 { font-size: 1.6rem; color: var(--texto-principal); margin-bottom: 5px; font-weight: 700; }
        .item-hero p { color: var(--amarelo-corda); font-size: 0.9rem; font-weight: 600; text-transform: uppercase; }

        /* PAINEL DE RESERVA */
        .painel-reserva { 
            background: var(--bg-card); 
            flex-grow: 1; 
            border-radius: 30px 30px 0 0; 
            padding: 40px 30px; 
            box-shadow: 0 -5px 25px rgba(0,0,0,0.1); 
            display: flex; 
            flex-direction: column; 
            transition: background-color 0.3s ease;
        }
        
        .form-container { max-width: 500px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; flex-grow: 1; }

        .input-group { margin-bottom: 25px; }
        .input-group label { display: block; font-size: 0.9rem; color: var(--texto-apoio); margin-bottom: 10px; font-weight: 600; }
        .input-group input { 
            width: 100%; 
            padding: 16px; 
            border-radius: 12px; 
            border: 2px solid var(--borda); 
            background: var(--bg-input); 
            color: var(--texto-principal); 
            outline: none; 
            font-size: 1rem; 
            transition: 0.3s; 
            cursor: pointer; 
        }
        .input-group input:focus { border-color: var(--amarelo-corda); }
        .input-group input:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-confirmar { 
            width: 100%; 
            padding: 18px; 
            border: none; 
            border-radius: 12px; 
            background: var(--amarelo-corda); 
            color: #1a2857; 
            font-weight: 700; 
            font-size: 1.1rem; 
            cursor: pointer; 
            transition: 0.3s; 
            margin-top: auto; 
            box-shadow: 0 4px 15px rgba(255, 222, 0, 0.2);
        }
        .btn-confirmar:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 222, 0, 0.3); }
        .btn-confirmar:disabled { background: var(--bg-input); color: var(--texto-apoio); cursor: not-allowed; box-shadow: none; transform: none; }

        /* SOBRESCRITA DO FLATPICKR PARA ACOMPANHAR O TEMA */
        .flatpickr-calendar { background: var(--cal-bg) !important; border: 1px solid var(--borda) !important; box-shadow: var(--sombra) !important; }
        .flatpickr-month, .flatpickr-current-month .flatpickr-monthDropdown-months, .flatpickr-current-month input.cur-year, .flatpickr-weekday { color: var(--cal-text) !important; fill: var(--cal-text) !important; }
        .flatpickr-day { color: var(--cal-text) !important; }
        .flatpickr-day:hover { background: var(--cal-hover) !important; border-color: var(--cal-hover) !important; }
        .flatpickr-day.selected { background: var(--amarelo-corda) !important; border-color: var(--amarelo-corda) !important; color: #1a2857 !important; font-weight: bold; }
        
        /* Cores Personalizadas para Datas Disponíveis/Indisponíveis */
        .flatpickr-day:not(.flatpickr-disabled):not(.today):not(.selected) { background: rgba(17, 135, 66, 0.1); border-color: transparent; color: var(--sucesso) !important; font-weight: 600; }
        .flatpickr-day.flatpickr-disabled { background: rgba(231, 76, 60, 0.1) !important; color: var(--erro) !important; text-decoration: line-through; opacity: 0.8; }

        /* TOASTS */
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { padding: 15px 20px; border-radius: 10px; color: white; font-weight: 600; box-shadow: 0 5px 15px rgba(0,0,0,0.4); transform: translateX(120%); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; align-items: center; gap: 10px; }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <header>
        <div class="header-left">
            <a href="inventario.html" class="btn-voltar">❮</a>
            <span class="header-title">Nova Solicitação</span>
        </div>
        <button class="btn-theme" id="theme-btn" onclick="toggleTheme()">☀️</button>
    </header>

    <div class="item-hero">
        <h2 id="nome-item">Carregando Material...</h2>
        <p id="codigo-item">Verificando calendário no servidor...</p>
    </div>

    <div class="painel-reserva">
        <form class="form-container" onsubmit="confirmarReserva(event)">
            <div class="input-group">
                <label>Data de Retirada (Selecione)</label>
                <input type="text" id="data-retirada" placeholder="Toque para abrir o calendário" required disabled>
            </div>
            <div class="input-group">
                <label>Data de Devolução (Selecione)</label>
                <input type="text" id="data-devolucao" placeholder="Toque para abrir o calendário" required disabled>
            </div>
            <button type="submit" class="btn-confirmar" id="btn-submit" disabled>Aguarde a verificação...</button>
        </form>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbz-HPqOljfPHzDgfD1weR-zCqIobb7hGWoGnq3oM0PLV0FzRA6SZLs3VbxyPF6BCTI/exec';
        const codigoAtual = new URLSearchParams(window.location.search).get('item');

        // GESTÃO DE TEMAS
        if (document.documentElement.classList.contains('light-mode')) {
            document.getElementById('theme-btn').innerText = '🌙';
        } else {
            document.getElementById('theme-btn').innerText = '☀️';
        }

        function toggleTheme() {
            const html = document.documentElement;
            const btn = document.getElementById('theme-btn');
            
            if (html.classList.contains('light-mode')) {
                html.classList.remove('light-mode');
                btn.innerText = '☀️';
                localStorage.setItem('aimore-theme', 'dark');
            } else {
                html.classList.add('light-mode');
                btn.innerText = '🌙';
                localStorage.setItem('aimore-theme', 'light');
            }
        }

        // SISTEMA DE TOASTS
        function showToast(msg, tipo = 'sucesso') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const cores = { sucesso: 'var(--sucesso)', erro: 'var(--erro)', aviso: 'var(--aviso)' };
            const icones = { sucesso: '✅', erro: '❌', aviso: '⚠️' };
            
            toast.className = 'toast';
            toast.style.background = cores[tipo];
            toast.innerHTML = `<span>${icones[tipo]}</span> ${msg}`;
            container.appendChild(toast);
            setTimeout(() => toast.style.transform = 'translateX(0)', 10);
            setTimeout(() => { toast.style.transform = 'translateX(130%)'; setTimeout(() => toast.remove(), 300); }, 3500);
        }

        // INICIALIZAÇÃO DA PÁGINA
        document.addEventListener('DOMContentLoaded', () => {
            if (!localStorage.getItem('userRole')) { window.location.href = 'index.html'; return; }
            if (!codigoAtual) { showToast("Item não especificado.", "erro"); setTimeout(() => window.location.href = 'inventario.html', 2000); return; }
            
            document.getElementById('codigo-item').innerText = `Item Nº ${codigoAtual}`;
            carregarReservasDoItem();
        });

        function carregarReservasDoItem() {
            fetch(`${scriptURL}?action=get_reservas&codigo=${codigoAtual}`)
                .then(res => res.json())
                .then(data => {
                    // Opcional: Se quiser buscar o nome exato do item, você pode ajustar a API no Apps Script depois,
                    // mas por enquanto mantemos "Material Selecionado" para ficar rápido.
                    document.getElementById('nome-item').innerText = `Material Selecionado`;
                    
                    const datasBloqueadas = data.map(res => ({
                        from: res.retirada.split('T')[0],
                        to: res.devolucao.split('T')[0]
                    }));

                    iniciarCalendarios(datasBloqueadas);

                    document.getElementById('data-retirada').disabled = false;
                    document.getElementById('data-devolucao').disabled = false;
                    document.getElementById('btn-submit').innerText = "Confirmar Solicitação";
                    document.getElementById('btn-submit').disabled = false;
                    document.getElementById('codigo-item').innerText = `Item Nº ${codigoAtual} • Calendário Livre`;
                })
                .catch(() => showToast("Erro ao sincronizar calendário com o servidor.", "erro"));
        }

        function iniciarCalendarios(datasBloqueadas) {
            const config = {
                locale: "pt",
                dateFormat: "Y-m-d",
                minDate: "today", 
                disable: datasBloqueadas,
                disableMobile: "true" // Força o layout customizado no mobile em vez da interface nativa feia
            };

            const pickerRetirada = flatpickr("#data-retirada", config);
            const pickerDevolucao = flatpickr("#data-devolucao", config);

            // Garante que não se pode devolver antes de pegar
            document.getElementById("data-retirada").addEventListener("change", function(e) {
                pickerDevolucao.set("minDate", e.target.value);
            });
        }

        function confirmarReserva(e) {
            e.preventDefault();
            const retirada = document.getElementById('data-retirada').value;
            const devolucao = document.getElementById('data-devolucao').value;
            
            if(!retirada || !devolucao) return showToast("Por favor, selecione as datas de retirada e devolução.", "aviso");

            const btn = document.getElementById('btn-submit');
            btn.innerText = "Registrando Reserva..."; btn.disabled = true;

            const payload = {
                action: 'reservar', 
                codigo: codigoAtual,
                usuario: localStorage.getItem('userName'), 
                retirada: retirada, 
                devolucao: devolucao
            };

            fetch(scriptURL, { method: 'POST', body: JSON.stringify(payload) })
            .then(res => res.json())
            .then(data => {
                if(data.status === 'sucesso'){
                    showToast("Reserva efetuada com sucesso!", "sucesso");
                    setTimeout(() => window.location.href = 'inventario.html', 1500);
                } else {
                    showToast(data.detalhe, "erro");
                    btn.innerText = "Confirmar Solicitação"; btn.disabled = false;
                }
            })
            .catch(() => { 
                showToast("Erro na conexão com o banco de dados.", "erro"); 
                btn.innerText = "Confirmar Solicitação"; btn.disabled = false; 
            });
        }
    </script>
</body>
</html>
