services:
  site-aimore:
    build: .
    restart: always
    container_name: portal-aimore
    networks:
      - dokploy-network 
    labels:
      - "traefik.enable=true"
      # Regra de Host
      - "traefik.http.routers.site-aimore.rule=Host(`geaimore.com.br`)"
      
      # Define que este roteador usará HTTPS (porta 443)
      - "traefik.http.routers.site-aimore.entrypoints=websecure"
      
      # Ativa o TLS e define o resolver de certificados (o Dokploy usa 'letsencrypt')
      - "traefik.http.routers.site-aimore.tls=true"
      - "traefik.http.routers.site-aimore.tls.certresolver=letsencrypt"
      
      # Porta interna do container
      - "traefik.http.services.site-aimore.loadbalancer.server.port=80"

networks:
  dokploy-network:
    external: true
