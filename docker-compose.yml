services:
  site-aimore:
    build: .
    restart: always
    container_name: portal-aimore
    labels:
      - "traefik.enable=true"
      # Substitua SEU-IP pelo IP real da sua VPS (ex: 123.456.78.90)
      - "traefik.http.routers.aimore.rule=Host(`aimore.72.61.38.132.sslip.io`)"
      - "traefik.http.routers.aimore.entrypoints=websecure"
      - "traefik.http.routers.aimore.tls.certresolver=letsencrypt"
      - "traefik.http.services.aimore.loadbalancer.server.port=80"
