services:
  site-aimore:
    build: .
    restart: always
    container_name: portal-aimore
    networks:
      - dokploy-network 
    labels:
      - "traefik.enable=true"
      # COLOQUE SEU DOMÍNIO ABAIXO (Ex: aimore.com.br)
      - "traefik.http.routers.site-aimore.rule=Host(`geaimore.com.br`) || Host(`www.geaimore.com.br`)"
      - "traefik.http.routers.site-aimore.entrypoints=websecure"
      - "traefik.http.routers.site-aimore.tls=true"
      - "traefik.http.routers.site-aimore.tls.certresolver=letsencrypt"
      # Porta interna do seu serviço (onde o site roda dentro do container)
      - "traefik.http.services.site-aimore.loadbalancer.server.port=80"

networks:
  dokploy-network:
    external: true
