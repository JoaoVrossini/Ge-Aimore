<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Tropa | G.E. Aimoré</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>if (localStorage.getItem('aimore-theme') === 'light') document.documentElement.classList.add('light-mode');</script>
    <style>
        /* Aproveitando o seu Design System Global */
        :root { --bg-fundo: #050a1f; --bg-card: #0e1633; --bg-header: #0e1633; --bg-input: #1a244d; --azul-aimore: #1a2857; --amarelo-corda: #ffde00; --branco: #ffffff; --texto-principal: #ffffff; --texto-apoio: #a0aec0; --sucesso: #118742; --erro: #e74c3c; --aviso: #f39c12; --borda: rgba(255, 255, 255, 0.05); --sombra: 0 10px 30px rgba(0,0,0,0.5); }
        html.light-mode { --bg-fundo: #f4f6f8; --bg-card: #ffffff; --bg-header: #ffffff; --bg-input: #f0f2f5; --texto-principal: #1a2857; --texto-apoio: #4a5568; --borda: rgba(26, 40, 87, 0.1); --sombra: 0 4px 15px rgba(26, 40, 87, 0.1); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-fundo); color: var(--texto-principal); transition: 0.3s; padding-bottom: 40px; }
        
        header { background: var(--bg-header); padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid var(--amarelo-corda); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .btn-voltar { background: transparent; border: 1px solid var(--texto-apoio); color: var(--texto-apoio); width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer; text-decoration: none; transition: 0.3s; }
        .btn-voltar:hover { border-color: var(--amarelo-corda); color: var(--amarelo-corda); }
        .header-title { font-size: 1.1rem; font-weight: 700; color: var(--texto-principal); }
        
        .container { max-width: 800px; margin: 30px auto; padding: 0 20px; display: grid; gap: 30px; grid-template-columns: 1fr; }
        @media (min-width: 768px) { .container { grid-template-columns: 1fr 1fr; } }
        
        .admin-card { background: var(--bg-card); padding: 25px; border-radius: 16px; border: 1px solid var(--borda); box-shadow: var(--sombra); }
        .admin-card h3 { margin-bottom: 5px; color: var(--texto-principal); }
        .admin-card p { font-size: 0.85rem; color: var(--texto-apoio); margin-bottom: 20px; }
        
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.85rem; color: var(--texto-apoio); margin-bottom: 6px; font-weight: 500; }
        .input-group input, .input-group select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--borda); background: var(--bg-input); color: var(--texto-principal); outline: none; }
        
        .btn-submit { width: 100%; padding: 14px; background: var(--amarelo-corda); color: #1a2857; font-weight: 700; border: none; border-radius: 10px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(255, 222, 0, 0.2); }
        
        .user-list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--borda); }
        
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { padding: 15px 20px; border-radius: 10px; color: white; font-weight: 600; box-shadow: 0 5px 15px rgba(0,0,0,0.4); transform: translateX(120%); transition: 0.3s; display: flex; align-items: center; gap: 10px; }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <header>
        <div class="header-left">
            <a href="hub.html" class="btn-voltar">❮</a>
            <span class="header-title">Gestão de Usuários</span>
        </div>
    </header>

    <main class="container">
        <div class="admin-card">
            <h3>Cadastrar Novo Membro</h3>
            <p>A senha inicial será igual ao número de registro.</p>
            <form onsubmit="cadastrarUsuario(event)">
                <div class="input-group">
                    <label>Registro Escoteiro</label>
                    <input type="text" id="novo-registro" maxlength="8" required>
                </div>
                <div class="input-group">
                    <label>Email do Membro</label>
                    <input type="email" id="novo-email" required>
                </div>
                <button type="submit" class="btn-submit" id="btn-cadastrar">Registrar no Sistema</button>
            </form>
        </div>

        <div class="admin-card">
            <h3>Níveis de Permissão</h3>
            <p>Altere os cargos dos membros da tropa.</p>
            <div class="input-group">
                <input type="text" id="buscaUsuario" placeholder="🔍 Buscar registro ou email..." onkeyup="filtrarUsuarios()">
            </div>
            <div id="lista-usuarios" style="max-height: 300px; overflow-y: auto; padding-right: 5px;">Carregando...</div>
        </div>
    </main>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbx59Nv3FaWGg2aGIwOo7UH-ott9xwll6Enf-m_S3p4YIknuCxYK_KjA3J0zxcti5bw/exec';

        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('userRole') !== 'admin') {
                window.location.href = 'hub.html';
                return;
            }
            carregarListaUsuarios();
        });

        function showToast(msg, tipo = 'sucesso') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const cores = { sucesso: 'var(--sucesso)', erro: 'var(--erro)', aviso: 'var(--aviso)' };
            const icones = { sucesso: '✅', erro: '❌', aviso: '⚠️' };
            toast.className = 'toast'; toast.style.background = cores[tipo];
            toast.innerHTML = `<span>${icones[tipo]}</span> ${msg}`;
            container.appendChild(toast);
            setTimeout(() => toast.style.transform = 'translateX(0)', 10);
            setTimeout(() => { toast.style.transform = 'translateX(130%)'; setTimeout(() => toast.remove(), 300); }, 3000);
        }

        // CADASTRAR NOVO USUÁRIO
        function cadastrarUsuario(e) {
            e.preventDefault();
            const registro = document.getElementById('novo-registro').value;
            const email = document.getElementById('novo-email').value;
            const btn = document.getElementById('btn-cadastrar');
            
            btn.innerText = "Processando..."; btn.disabled = true;

            // Envia o registro também como senha
            fetch(scriptURL, { 
                method: 'POST', 
                body: JSON.stringify({action: 'register_user', registro: registro, email: email, senha: registro}) 
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'sucesso') {
                    showToast("Membro cadastrado com sucesso!", 'sucesso');
                    document.getElementById('novo-registro').value = '';
                    document.getElementById('novo-email').value = '';
                    carregarListaUsuarios(); // Atualiza a lista lateral
                } else showToast(data.detalhe, 'erro');
            })
            .catch(() => showToast("Erro ao criar conta.", 'erro'))
            .finally(() => { btn.innerText = "Registrar no Sistema"; btn.disabled = false; });
        }

        // CARREGAR USUÁRIOS
        function carregarListaUsuarios() {
            const lista = document.getElementById('lista-usuarios');
            fetch(`${scriptURL}?action=get_users`)
            .then(res => res.json())
            .then(users => {
                lista.innerHTML = '';
                users.forEach(u => {
                    const div = document.createElement('div');
                    div.className = 'user-list-item';
                    div.setAttribute('data-busca', `${u.registro} ${u.email}`.toLowerCase());
                    div.innerHTML = `
                        <div style="line-height: 1.2;">
                            <strong style="color: var(--texto-principal);">${u.registro}</strong><br>
                            <span style="font-size:0.75rem; color: var(--texto-apoio);">${u.email}</span>
                        </div>
                        <select onchange="mudarCargo('${u.registro}', this.value)">
                            <option value="user" ${u.role === 'user' ? 'selected' : ''}>Escoteiro</option>
                            <option value="patrimonio" ${u.role === 'patrimonio' ? 'selected' : ''}>Patrimônio</option>
                            <option value="admin" ${u.role === 'admin' ? 'selected' : ''}>Admin</option>
                        </select>
                    `;
                    lista.appendChild(div);
                });
            })
            .catch(() => lista.innerHTML = '<p style="color: var(--erro);">Erro ao carregar.</p>');
        }

        function filtrarUsuarios() {
            let input = document.getElementById('buscaUsuario').value.toLowerCase();
            let items = document.getElementsByClassName('user-list-item');
            for (let i = 0; i < items.length; i++) {
                let texto = items[i].getAttribute('data-busca');
                items[i].style.display = texto.includes(input) ? "flex" : "none";
            }
        }

        function mudarCargo(registroTarget, novoCargo) {
            showToast("Alterando cargo...", "aviso");
            fetch(scriptURL, { method: 'POST', body: JSON.stringify({action: 'change_role', targetRegistro: registroTarget, newRole: novoCargo}) })
            .then(res => res.json())
            .then(data => {
                if(data.status === 'sucesso') showToast(`Cargo atualizado!`, "sucesso");
                else showToast(data.detalhe, "erro");
            })
            .catch(() => showToast("Erro de conexão.", "erro"));
        }
    </script>
</body>
</html>
