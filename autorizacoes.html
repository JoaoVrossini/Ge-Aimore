<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividades | G.E. Aimoré 01/MG</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        if (localStorage.getItem('aimore-theme') === 'light') {
            document.documentElement.classList.add('light-mode');
        }
    </script>

    <style>
        /* DESIGN SYSTEM GLOBAL */
        :root {
            --bg-fundo: #050a1f; --bg-card: #0e1633; --bg-header: #0e1633; --bg-input: #1a244d;
            --azul-aimore: #1a2857; --amarelo-corda: #ffde00; --branco: #ffffff;
            --texto-principal: #ffffff; --texto-apoio: #a0aec0; --sucesso: #118742;
            --erro: #e74c3c; --aviso: #f39c12; --borda: rgba(255, 255, 255, 0.05);
            --sombra: 0 10px 30px rgba(0,0,0,0.5); --overlay: rgba(0, 0, 0, 0.8);
        }

        html.light-mode {
            --bg-fundo: #f4f6f8; --bg-card: #ffffff; --bg-header: #ffffff; --bg-input: #f0f2f5;
            --texto-principal: #1a2857; --texto-apoio: #4a5568; --sucesso: #0d6b34;
            --borda: rgba(26, 40, 87, 0.1); --sombra: 0 4px 15px rgba(26, 40, 87, 0.1);
            --overlay: rgba(0, 0, 0, 0.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-fundo); color: var(--texto-principal); padding-bottom: 80px; transition: 0.3s; }
        
        header { background: var(--bg-header); padding: 15px 20px; position: sticky; top: 0; z-index: 100; display: flex; gap: 10px; align-items: center; border-bottom: 2px solid var(--amarelo-corda); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-voltar, .btn-theme { background: transparent; border: 1px solid var(--texto-apoio); color: var(--texto-apoio); width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer; text-decoration: none; transition: 0.3s; }
        header input { flex: 1; padding: 12px 15px; border-radius: 10px; border: 1px solid var(--borda); background: var(--bg-input); color: var(--texto-principal); outline: none; }

        .container { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
        .grid-atividades { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }

        .card-atividade { background: var(--bg-card); border-radius: 16px; padding: 25px; border: 1px solid var(--borda); box-shadow: var(--sombra); transition: 0.3s; display: flex; flex-direction: column; }
        .badge-data { background: var(--bg-input); padding: 6px 12px; border-radius: 8px; font-size: 0.8rem; color: var(--amarelo-corda); font-weight: 700; border: 1px solid var(--borda); margin-bottom: 10px; align-self: flex-start; }
        .card-atividade h3 { font-size: 1.25rem; margin-bottom: 20px; font-weight: 700; }

        .actions-row { display: flex; gap: 10px; margin-top: auto; flex-wrap: wrap; }
        .btn-acao { flex: 1 1 130px; padding: 14px; border: none; border-radius: 10px; font-weight: 700; font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; transition: 0.3s; }
        .btn-anexar { background: var(--amarelo-corda); color: #1a2857; }
        .btn-drive { background: transparent; border: 1px solid var(--texto-apoio); color: var(--texto-apoio); }

        .fab-adicionar { position: fixed; bottom: 30px; right: 20px; width: 65px; height: 65px; border-radius: 50%; background: var(--amarelo-corda); color: #1a2857; font-size: 2.5rem; font-weight: bold; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 1000; box-shadow: 0 5px 15px rgba(255, 222, 0, 0.4); }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--overlay); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 15px; }
        .modal-box { background: var(--bg-card); padding: 30px; border-radius: 24px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; border-top: 5px solid var(--amarelo-corda); }
        .input-group { margin-bottom: 18px; }
        .input-group label { display: block; font-size: 0.85rem; color: var(--texto-apoio); margin-bottom: 6px; }
        .input-group input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--borda); background: var(--bg-input); color: var(--texto-principal); outline: none; }
        
        .btn-salvar-modal { width: 100%; padding: 16px; background: var(--amarelo-corda); color: #1a2857; font-weight: 700; border: none; border-radius: 12px; cursor: pointer; margin-top: 15px; }
        .loading-indicator { display: none; text-align: center; margin-top: 15px; color: var(--amarelo-corda); font-weight: 600; }

        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { padding: 15px 20px; border-radius: 10px; color: white; font-weight: 600; box-shadow: 0 5px 15px rgba(0,0,0,0.4); transform: translateX(120%); transition: 0.3s; display: flex; align-items: center; gap: 10px; }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <header>
        <a href="hub.html" class="btn-voltar">❮</a>
        <input type="text" id="busca" placeholder="🔍 Buscar por nome ou data..." onkeyup="filtrarAtividades()">
        <button class="btn-theme" id="theme-btn" onclick="toggleTheme()">☀️</button>
    </header>

    <main class="container">
        <h2 style="margin-bottom: 20px;">Mural de Atividades</h2>
        <div class="grid-atividades" id="lista-atividades">
            <p style="color: var(--amarelo-corda); padding: 20px;">A carregar atividades...</p>
        </div>
    </main>

    <button class="fab-adicionar" onclick="abrirModalNova()">+</button>

    <div class="modal-overlay" id="modalNovaAtividade">
        <div class="modal-box">
            <h3>Nova Atividade</h3>
            <p style="font-size: 0.8rem; color: var(--texto-apoio); margin-bottom: 20px;">Cria uma pasta automática para as autorizações.</p>
            <form onsubmit="salvarNovaAtividade(event)">
                <div class="input-group">
                    <label>Nome do Evento</label>
                    <input type="text" id="nomeAtiv" required>
                </div>
                <div class="input-group">
                    <label>Data de Início</label>
                    <input type="date" id="dataInicio" required>
                </div>
                <div class="input-group">
                    <label>Data de Término</label>
                    <input type="date" id="dataFim" required>
                </div>
                <div class="input-group">
                    <label>Autorizações (Opcional)</label>
                    <input type="file" id="fotosFilesNova" multiple accept="image/*,application/pdf">
                </div>
                <button type="submit" class="btn-salvar-modal" id="btnSalvarNova">Criar Evento</button>
                <div id="loadingNova" class="loading-indicator">⏳ A processar...</div>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="modalAnexar">
        <div class="modal-box">
            <h3>Anexar Documentos</h3>
            <p id="nomeAtivAlvo" style="color: var(--amarelo-corda); margin-bottom: 20px; font-weight: bold;"></p>
            <form onsubmit="salvarAnexos(event)">
                <input type="hidden" id="folderIdAlvo">
                <div class="input-group">
                    <label>Selecione Ficheiros (JPG/PNG/PDF)</label>
                    <input type="file" id="fotosFilesAnexo" multiple accept="image/*,application/pdf" required>
                </div>
                <button type="submit" class="btn-salvar-modal" id="btnSalvarAnexo">Subir para o Drive</button>
                <div id="loadingAnexo" class="loading-indicator">⏳ A enviar ficheiros...</div>
            </form>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbytpxBSDoisT16SF7gNkkeFII2fyd9-KOHRoL5jCeIMG7CndEXztXSXsJCwhqzUNw/exec';

        function showToast(msg, tipo = 'sucesso') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.background = tipo === 'sucesso' ? 'var(--sucesso)' : 'var(--erro)';
            toast.innerHTML = msg;
            container.appendChild(toast);
            setTimeout(() => toast.style.transform = 'translateX(0)', 10);
            setTimeout(() => { toast.style.transform = 'translateX(120%)'; toast.remove(); }, 3500);
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (!localStorage.getItem('userRole')) { window.location.href = 'index.html'; return; }
            carregarAtividades();
        });

        function carregarAtividades() {
            fetch(`${scriptURL}?action=get_atividades`)
                .then(res => res.json())
                .then(data => {
                    const grid = document.getElementById('lista-atividades');
                    grid.innerHTML = '';
                    data.forEach(ativ => {
                        const card = `
                            <div class="card-atividade" data-busca="${ativ.nome.toLowerCase()}">
                                <div class="badge-data">📅 ${ativ.inicio.split('T')[0]}</div>
                                <h3>${ativ.nome}</h3>
                                <div class="actions-row">
                                    <button class="btn-acao btn-anexar" onclick="abrirModalAnexo('${ativ.folderId}', '${ativ.nome}')">📎 Anexar</button>
                                    <a href="${ativ.link}" target="_blank" class="btn-acao btn-drive">📂 Drive</a>
                                </div>
                            </div>
                        `;
                        grid.insertAdjacentHTML('beforeend', card);
                    });
                });
        }

        function abrirModalNova() { document.getElementById('modalNovaAtividade').style.display = 'flex'; }
        function fecharModais() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); }

        function abrirModalAnexo(folderId, nomeAtiv) {
            document.getElementById('folderIdAlvo').value = folderId;
            document.getElementById('nomeAtivAlvo').innerText = nomeAtiv;
            document.getElementById('modalAnexar').style.display = 'flex';
        }

        async function processarFicheiros(files) {
            const promessas = Array.from(files).map(file => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = e => resolve({ name: file.name, data: e.target.result });
                    reader.readAsDataURL(file);
                });
            });
            return await Promise.all(promessas);
        }

        async function salvarNovaAtividade(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSalvarNova');
            btn.disabled = true;
            document.getElementById('loadingNova').style.display = 'block';

            const files = document.getElementById('fotosFilesNova').files;
            const arquivos = await processarFicheiros(files);

            const payload = {
                action: 'registrar_atividade',
                nome: document.getElementById('nomeAtiv').value,
                inicio: document.getElementById('dataInicio').value,
                fim: document.getElementById('dataFim').value,
                arquivos: arquivos
            };

            fetch(scriptURL, { method: 'POST', body: JSON.stringify(payload) })
                .then(() => { showToast("Sucesso!"); location.reload(); })
                .catch(() => showToast("Falha na rede durante o upload.", "erro"));
        }

        async function salvarAnexos(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSalvarAnexo');
            btn.disabled = true;
            document.getElementById('loadingAnexo').style.display = 'block';

            const files = document.getElementById('fotosFilesAnexo').files;
            const arquivos = await processarFicheiros(files);

            const payload = {
                action: 'add_autorizacoes',
                folderId: document.getElementById('folderIdAlvo').value,
                arquivos: arquivos
            };

            fetch(scriptURL, { method: 'POST', body: JSON.stringify(payload) })
                .then(() => { showToast("Enviado!"); fecharModais(); })
                .catch(() => showToast("Falha na rede durante o upload.", "erro"))
                .finally(() => btn.disabled = false);
        }

        function filtrarAtividades() {
            const termo = document.getElementById('busca').value.toLowerCase();
            document.querySelectorAll('.card-atividade').forEach(card => {
                card.style.display = card.dataset.busca.includes(termo) ? 'flex' : 'none';
            });
        }

        function toggleTheme() {
            const isLight = document.documentElement.classList.toggle('light-mode');
            localStorage.setItem('aimore-theme', isLight ? 'light' : 'dark');
            document.getElementById('theme-btn').innerText = isLight ? '🌙' : '☀️';
        }
    </script>
</body>
</html>
